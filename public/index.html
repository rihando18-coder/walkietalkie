<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RP Radio Network</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen" class="screen active">
  <div class="login-box">
    <div class="logo-area">
      <div class="logo-icon">📡</div>
      <h1>RP RADIO NET</h1>
      <p class="subtitle">SECURE TACTICAL COMMUNICATIONS</p>
    </div>
    <div class="form-group">
      <label>CALLSIGN / BADGE</label>
      <input type="text" id="callsign-input" placeholder="e.g. OFFICER-42" maxlength="20" autocomplete="off">
    </div>
    <div class="form-group">
      <label>DEPARTMENT</label>
      <div class="dept-grid" id="dept-select">
        <button class="dept-btn" data-dept="POLICE">
          <span class="dept-icon">🚔</span>
          <span>POLICE</span>
          <span class="dept-freq">CH-1</span>
        </button>
        <button class="dept-btn" data-dept="FIRE">
          <span class="dept-icon">🚒</span>
          <span>FIRE DEPT</span>
          <span class="dept-freq">CH-2</span>
        </button>
        <button class="dept-btn" data-dept="DOT">
          <span class="dept-icon">🚧</span>
          <span>D.O.T</span>
          <span class="dept-freq">CH-3</span>
        </button>
        <button class="dept-btn" data-dept="JMPD">
          <span class="dept-icon">🛡️</span>
          <span>JMPD</span>
          <span class="dept-freq">CH-4</span>
        </button>
        <button class="dept-btn dept-btn-wide" data-dept="DISPATCH">
          <span class="dept-icon">🎙️</span>
          <span>DISPATCH</span>
          <span class="dept-freq">CH-5</span>
        </button>
      </div>
    </div>
    <button class="connect-btn" id="connect-btn" disabled>CONNECT TO RADIO</button>
    <div id="login-error" class="error-msg"></div>
  </div>
</div>

<!-- RADIO SCREEN -->
<div id="radio-screen" class="screen">
  <div class="radio-container">

    <!-- Header -->
    <div class="radio-header">
      <div class="header-left">
        <div class="signal-bars">
          <span class="bar b1"></span>
          <span class="bar b2"></span>
          <span class="bar b3"></span>
          <span class="bar b4"></span>
        </div>
        <span id="connection-status" class="status-text">CONNECTED</span>
      </div>
      <div class="header-center">
        <div class="dept-badge" id="dept-badge">POLICE</div>
      </div>
      <div class="header-right">
        <span id="callsign-display" class="callsign-tag"></span>
        <button class="icon-btn" id="logout-btn" title="Disconnect">✕</button>
      </div>
    </div>

    <!-- Frequency Display -->
    <div class="freq-display">
      <div class="freq-label">CHANNEL</div>
      <div class="freq-value" id="freq-display">CH-1</div>
      <div class="freq-label" id="dept-name-display">POLICE DEPARTMENT</div>
    </div>

    <!-- Transmission Status -->
    <div class="tx-area">
      <div class="tx-indicator" id="tx-indicator">
        <span class="tx-dot"></span>
        <span class="tx-text" id="tx-text">STANDBY</span>
      </div>
      <div class="waveform" id="waveform">
        <div class="wave-bar" style="--i:0"></div>
        <div class="wave-bar" style="--i:1"></div>
        <div class="wave-bar" style="--i:2"></div>
        <div class="wave-bar" style="--i:3"></div>
        <div class="wave-bar" style="--i:4"></div>
        <div class="wave-bar" style="--i:5"></div>
        <div class="wave-bar" style="--i:6"></div>
        <div class="wave-bar" style="--i:7"></div>
      </div>
    </div>

    <!-- Users on Channel -->
    <div class="channel-info">
      <div class="channel-label">UNITS ON CHANNEL <span id="user-count" class="count-badge">0</span></div>
      <div class="user-list" id="user-list">
        <span class="no-users">No units connected</span>
      </div>
    </div>

    <!-- Activity Log -->
    <div class="activity-log">
      <div class="log-label">ACTIVITY LOG</div>
      <div class="log-entries" id="log-entries"></div>
    </div>

    <!-- PTT Button -->
    <div class="ptt-area">
      <div class="ptt-hint" id="ptt-hint">Hold to transmit — Space bar or button</div>
      <button class="ptt-btn" id="ptt-btn">
        <span class="ptt-icon">🎙️</span>
        <span class="ptt-label">PUSH TO TALK</span>
      </button>
    </div>

  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="app.js"></script>
</body>
</html>
